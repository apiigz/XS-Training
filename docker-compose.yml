version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: xstraining-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: gimnasio 
    ports:
      - "5432:5432"
    volumes:
      - ./gimnasio.sql:/docker-entrypoint-initdb.d/gimnasio.sql