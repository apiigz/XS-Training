</head>
<body>
    <header class="cabecera-principal">
        <a href = "https://www.instagram.com/xs.training1"><img src = "recursos/imagenes/xslogo.jpg"></a>
        <nav> <!-- Barra de navegación, con accesos a las otras páginas. La parte de arriba-->

                <li><a href="index.html">INICIO</a></li>
                <li><a href ="entrenamientos.html">ENTRENAMIENTOS</a></li>
                <li><a href="inscripcion.html">INSCRIPCION</a></li>
                <li><a href="contacto.html">CONTACTO</a></li>
                <li><a href="acceso.html">ACCESO</a></li>
            </ul>
        </nav>
    </header>
    <main class="contenido-principal">
        <section class="inscripcion">
            <h1>
                INSCRIPCION
            </h1>
            <form action="inscripcion.html" method="post">
                <div class="formulario-inscripcion">
                    <label for="text-nombre">
                        NOMBRE
                        <input type="text" name="nombre" id="text-nombre" required>
                    </label>
                    <label for="text-apellido">
                        APELLIDO
                        <input type="text" name="apellido" id="text-apellido" required>
                    </label>
                    <label for="text-dni">
                        DNI
                        <input type="text" name="dni" id="text-dni" required>
                    </label>
                    <label for="tel-numero">
                        NÚMERO DE TELEFONO
                        <input type="tel" name="numero" id="tel-numero" required>
                    </label>
                    <label for="email-correo">
                        CORREO ELECTRONICO
                        <input type="email" name="correo" id="email-correo">
                    </label>
                    <button type="submit" name="enviar-datosinscripcion"> <!--Indicar el type para el botón, aunque no haga nada este actua como un elemento semántico-->
                        INSCRIBIRSE
                    </button>
                </div>
            </form>
        </section>
    </main>
    <footer class="pie-principal">
        <address> <!--Elemento semántico para indicar las direcciones-->
            <ul><!--El pie con datos de contacto, dirección y demás. La parte de abajo.-->
                <li><a href="https://www.instagram.com/xs.training1"><img src="recursos/imagenes/ig.png" alt="Logo Instagram"></a></li>
                <li><a class="logo-wpp" href="https://wa.me/+5493515556666"><img src="recursos/imagenes/ws.png" alt="Logo wpp"></a></li>
            </ul>
        </address>
    </footer>
</body>
</html>
